<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>

    </header>
    <main>
        <h1>Pedidos</h1>
        <form action="">
            <h2>Datos cliente</h2>
            <label for="nombreCliente">Nombre</label>
            <input type="text" id="nombreCliente">
            <label for="apellidoCliente">Apellido</label>
            <input type="text" id="apellidoCliente">
            <label for="correoCliente">Correo</label>
            <input type="email" id="correoCliente">
            <label for="telefonoCliente">Telefono</label>
            <input type="tel" id="telefonoCliente">

            <h2>Datos del pedido</h2>
            <h3>Tipo de hamburgesa</h3>
            <input type="radio" id="clasica" value="Clasica">
            <label for="clasica">Hamburgesa Clasica</label> <br>
            <input type="radio" id="dobleCarne" value="Doble Carne">
            <label for="dobleCarne">Hamburgesa Doble Carne</label><br>
            <input type="radio" id="vegetariana" value="vegetariana">
            <label for="vegetariana">Hamburgesa Vegetariana</label><br>

            <h3>Ingredientes extra</h3>
            <input type="checkbox" id="queso" name="queso" value="Queso">
            <label for="queso"> Queso</label><br>
            <input type="checkbox" id="tocineta" name="tocineta" value="Tocineta">
            <label for="tocineta"> Tocineta</label><br>
            <input type="checkbox" id="huevo" name="huevo" value="Huevo">
            <label for="huevo"> Huevo</label><br><br>

            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" min="1" value="1"><br>

            <label for="comentarios">Comentarios</label>
            <textarea name="comentarios" id="comentarios" cols="30" rows="10"></textarea><br>

            <h2>Entrega</h2>
            <label for="direccion">Direccion</label>
            <input type="text" id="direccion" required><br>
            
            <label for="opciones">Forma de pago:</label>
            <select id="opciones" name="opciones">
                <option value="">-- Selecciona --</option>
                <option value="opcion1">Efectivo</option>
                <option value="opcion2">Tarjeta</option>
                <option value="opcion3">Transferencia</option>
            </select><br>


            <input type="submit" value="Realizar pedido">
        </form>
    </main>
</body>
</html>
