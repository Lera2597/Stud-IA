<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de tareas</title>
</head>
<body>
    <div class="container">
        <h1>Lista de tareas</h1>
        <div>
            <input type="text" id="taskInput" placeholder="Escribe una tarea aqui">
            <button id="addTaskBtn">Agregar</button>
        </div>

        <h2>Tareas</h2>
        <ul id="taskList"></ul>

        <div class="counters">
            <p>Total: <span id="totalCount">0</span></p>
            <p>Completadas: <span id="completedCount">0</span></p>
            <p>Pendientes: <span id="pendingCount">0</span></p>
        </div>
    </div>
    <script src="./src/javascript/app.js"></script>
</body>
</html>
